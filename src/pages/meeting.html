<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtikMeet - Call Room</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/meeting.css">
</head>
<body>
  <!-- Custom titlebar -->
  <div class="custom-titlebar">
    <div class="titlebar-drag">
      <span class="app-title" id="room-title">AtikMeet - Room</span>
    </div>
    <div class="titlebar-controls">
      <button class="control-btn minimize-btn" id="min-btn">
        <svg viewBox="0 0 10 1" width="10" height="1"><rect width="10" height="1" fill="#fff"/></svg>
      </button>
      <button class="control-btn maximize-btn" id="max-btn">
        <svg viewBox="0 0 10 10" width="10" height="10"><rect width="8" height="8" x="1" y="1" fill="none" stroke="#fff" stroke-width="1.2"/></svg>
      </button>
      <button class="control-btn close-btn" id="close-btn">
        <svg viewBox="0 0 10 10" width="10" height="10">
          <path d="M0,0 L10,10 M10,0 L0,10" stroke="#fff" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="meeting-layout">
    <!-- Main Video Grid Area -->
    <div class="main-video-area">
      <!-- Top Info overlay -->
      <div class="top-overlay-bar">
        <div class="room-info">
          <span class="meeting-id-badge" id="display-meeting-id">atikmeet-xxxx-xxxx-xxxx</span>
          <button class="copy-btn-sm" id="btn-copy-id" title="Copy Room ID">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <div class="encryption-indicator" title="End-to-End Encrypted (AES-256)">
          <span class="lock-icon">🔒</span>
          <span class="e2e-text">E2EE Active</span>
        </div>
        <div class="call-timer" id="call-timer">00:00:00</div>
        
        <!-- Recording banner -->
        <div class="recording-banner" id="recording-banner" style="display: none;">
          <div class="rec-dot"></div>
          <span>REC</span>
        </div>
      </div>

      <!-- Grid for Video Streams -->
      <div class="video-grid" id="video-grid">
        <!-- Self Video (Will be added dynamically) -->
      </div>

      <!-- Emoji Floating Container -->
      <div class="emoji-overlay" id="emoji-overlay"></div>
    </div>

    <!-- Right Side Panels (Slideouts) -->
    
    <!-- Participants Panel -->
    <aside class="slideout-panel" id="participants-panel" style="display: none;">
      <div class="panel-header">
        <h3>Participants (<span id="participant-count-badge">1</span>)</h3>
        <button class="close-panel-btn" id="close-participants-panel">&times;</button>
      </div>
      <div class="panel-search">
        <input type="text" id="participant-search" placeholder="Search people...">
      </div>
      
      <!-- List container -->
      <div class="participants-list" id="participants-list-container">
        <!-- Will be populated dynamically -->
      </div>

      <!-- Mod Control footer -->
      <div class="panel-footer host-controls" id="host-controls-footer" style="display: none;">
        <button class="btn btn-danger btn-sm btn-block" id="btn-mute-all">Mute All Participants</button>
      </div>
    </aside>

    <!-- Chat Panel -->
    <aside class="slideout-panel" id="chat-panel" style="display: none;">
      <div class="panel-header">
        <h3>In-call Chat</h3>
        <button class="close-panel-btn" id="close-chat-panel">&times;</button>
      </div>
      <div class="chat-messages" id="chat-messages-container">
        <!-- Messages -->
      </div>
      <form class="chat-input-area" id="chat-send-form">
        <input type="text" id="chat-input" placeholder="Send a message to everyone..." autocomplete="off">
        <button type="submit" class="chat-send-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </aside>
  </div>

  <!-- Bottom Interactive Toolbar -->
  <footer class="meeting-toolbar">
    <!-- Left toolbar items -->
    <div class="toolbar-left">
      <span class="meeting-details-toggle" id="meeting-details-toggle">Meeting Details ▴</span>
    </div>

    <!-- Center controls -->
    <div class="toolbar-center">
      <!-- Mute Mic -->
      <button class="tool-circle-btn" id="btn-mic" title="Toggle Mic (Ctrl+D)">
        <svg id="mic-on-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        <svg id="mic-off-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      
      <!-- Toggle Cam -->
      <button class="tool-circle-btn" id="btn-cam" title="Toggle Camera (Ctrl+E)">
        <svg id="cam-on-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <svg id="cam-off-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10l-2.44-1.74"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>

      <!-- Share Screen -->
      <button class="tool-circle-btn" id="btn-screen" title="Share Screen (1080p)">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>

      <!-- Hand Raise -->
      <button class="tool-circle-btn" id="btn-hand" title="Raise Hand">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5m0 0V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v7m0 0V5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v6m0 0V9a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v9a4 4 0 0 0 4 4h5a5 5 0 0 0 5-5v-5"/></svg>
      </button>

      <!-- Reactions -->
      <button class="tool-circle-btn" id="btn-reactions" title="Reactions">
        <span style="font-size: 1.2rem;">😀</span>
      </button>

      <!-- Record Meeting -->
      <button class="tool-circle-btn btn-record" id="btn-record" title="Record Meeting to E Drive">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      </button>

      <!-- End Call (RED) -->
      <button class="tool-circle-btn btn-end-call" id="btn-end" title="Leave Meeting">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.62 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2 2A17 17 0 0 1 3 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .62 2.81 2 2 0 0 1-.45 2.11L8.9 9.94a16 16 0 0 0 1.78 3.37z"/></svg>
      </button>
    </div>

    <!-- Right toolbar controls -->
    <div class="toolbar-right">
      <button class="tool-btn" id="toggle-participants" title="Show Participants">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="badge" id="badge-participants-count" style="display:none;">0</span>
      </button>
      <button class="tool-btn" id="toggle-chat" title="Chat">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="badge" id="badge-chat-unread" style="display:none;">0</span>
      </button>
    </div>
  </footer>

  <!-- Emoji Selector Popup -->
  <div class="reaction-selector glass-card" id="reaction-selector-popup" style="display: none;">
    <button class="reaction-emoji" data-emoji="👍">👍</button>
    <button class="reaction-emoji" data-emoji="💖">💖</button>
    <button class="reaction-emoji" data-emoji="😂">😂</button>
    <button class="reaction-emoji" data-emoji="🎉">🎉</button>
    <button class="reaction-emoji" data-emoji="😮">😮</button>
  </div>

  <!-- Waiting Room Approval Notification Dialog -->
  <div class="admit-dialog glass-card" id="approval-popup" style="display: none;">
    <div class="admit-info">
      <h4>Join Request</h4>
      <p><span id="admit-user-name" style="font-weight: bold; color:var(--accent);">Someone</span> wants to join this meeting.</p>
    </div>
    <div class="admit-actions">
      <button class="btn btn-secondary btn-sm" id="btn-deny-join">Deny</button>
      <button class="btn btn-primary btn-sm" id="btn-admit-join">Admit</button>
    </div>
  </div>

  <script src="../js/browser-fallback.js"></script>
  <script src="../js/encryption.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/recording.js"></script>
  <script src="../js/meeting.js"></script>
  <script>
    // Titlebar controls
    document.getElementById('min-btn').addEventListener('click', () => window.electronAPI.minimize());
    document.getElementById('max-btn').addEventListener('click', () => window.electronAPI.maximize());
    document.getElementById('close-btn').addEventListener('click', () => {
      // Force end of meeting on close
      if (confirm("Leave this meeting?")) {
        window.electronAPI.navigate('home');
      }
    });
  </script>
</body>
</html>
